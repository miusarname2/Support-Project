version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - ai-service
    volumes:
      - ./backend/src:/app/src

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    env_file: .env

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    env_file: .env
    depends_on:
      - backend
